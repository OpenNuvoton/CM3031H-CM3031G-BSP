project:
  packs:
    - pack: Nuvoton::NuMicroCM33_DFP
  setups:
    - setup: Options for FreeRTOS
      processor:
        fpu: sp
      add-path:
        - ..
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/Device/Nuvoton/cm3031/Config
        - ../../../../Library/Device/Nuvoton/cm3031/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../ThirdParty/FreeRTOS/include
        - ../../../../ThirdParty/FreeRTOS/Demo/Common/include
        - ../../../../ThirdParty/FreeRTOS/portable/GCC/ARM_CM33_NTZ/non_secure
      debug: "on"
      define:
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --symbols
            - --info sizes
            - --info totals
            - --map --datacompressor=off --info=inline --entry Reset_Handler
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: ../../../../Library/Device/Nuvoton/cm3031/Config/cm3031_ac6.sct
  groups:
    - group: System
      files:
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/startup_cm3031.c
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/system_cm3031.c
    - group: Demo Files
      files:
        - file: ../FreeRTOSConfig.h
        - file: ../main.c
    - group: FreeRTOS files
      files:
        - file: ../../../../ThirdParty/FreeRTOS/tasks.c
        - file: ../../../../ThirdParty/FreeRTOS/timers.c
        - file: ../../../../ThirdParty/FreeRTOS/list.c
        - file: ../../../../ThirdParty/FreeRTOS/queue.c
        - file: ../../../../ThirdParty/FreeRTOS/portable/GCC/ARM_CM33_NTZ/non_secure/port.c
        - file: ../../../../ThirdParty/FreeRTOS/portable/MemMang/heap_2.c
        - file: ../../../../ThirdParty/FreeRTOS/portable/GCC/ARM_CM33_NTZ/non_secure/portasm.c
    - group: lib
      files:
        - file: ../../../../Library/StdDriver/src/clk.c
        - file: ../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../Library/StdDriver/src/sys.c
        - file: ../../../../Library/StdDriver/src/uart.c
        - file: ../../../../Library/StdDriver/src/gpio.c
