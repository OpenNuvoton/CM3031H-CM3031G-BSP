project:
  packs:
    - pack: Nuvoton::NuMicroCM33_DFP
  misc:
    - for-compiler: AC6
      C: [-std=c99, -flto, -fno-rtti, -funsigned-char, -fshort-enums, -fshort-wchar, -ffunction-sections, -fdata-sections, -D__MICROLIB, -gdwarf-4, -fno-inline]
      ASM: [-D__MICROLIB]
      Link: [--lto, --library_type=microlib, --map, --load_addr_map_info, --symbols, --info sizes, --info totals, --entry Reset_Handler, --summary_stderr, --info summarysizes, --diag_suppress=6314]
    - for-compiler: GCC
      C: [-std=gnu11, --specs=nano.specs, -Wall -Wno-format, -Wno-return-type, -Wno-unused-but-set-variable, -fdata-sections, -ffunction-sections, -fno-builtin,
          -fshort-enums, -funsigned-char, -mthumb, -Wno-main, -gdwarf-4]
      Link:
        - -Xlinker
        - --gc-sections
        - --specs=nano.specs
        - --specs=nosys.specs
        - -Wl,-Map,"$OutDir()$/$Project$.map"
  setups:
    - output:
        type: ["elf", "bin"]
  linker:
    - for-compiler: AC6
      script: ../../../../Library/Device/Nuvoton/cm3031/Config/cm3031_ac6_ldrom.sct
    - for-compiler: GCC
      script: ../../../../Library/Device/Nuvoton/cm3031/Config/cm3031_gcc_ldrom.ld
  add-path:
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/Device/Nuvoton/cm3031/Include
        - ../../../../Library/StdDriver/inc
  groups:
    - group: CMSIS
      files:
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/startup_cm3031.c
          for-compiler: AC6
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/startup_cm3031.c
          for-compiler: GCC
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/system_cm3031.c
    - group: User
      files:
        - file: ../main.c
        - file: ../fmc_user.c
        - file: ../isp_user.c
        - file: ../uart_transfer.c
        - file: ../targetdev.c
    - group: Library
      files:
        - file: ../../../../Library/StdDriver/src/clk.c
