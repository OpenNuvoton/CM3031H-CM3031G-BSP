project:
  packs:
    - pack: Nuvoton::NuMicroCM33_DFP
  setups:
    - setup: Options for SGL_Demo
      processor:
        fpu: sp
        endian: little
        trustzone: non-secure
      add-path:
        - ..
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/Device/Nuvoton/cm3031/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../ThirdParty/sgl
        - ../../../../ThirdParty/sgl/include
      debug: "on"
      define:
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c11
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --info sizes
            - --info totals
            - --info veneers
            - --map --datacompressor=off --info=inline --entry Reset_Handler
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: ../../../../Library/Device/Nuvoton/cm3031/Config/cm3031_ac6.sct
  groups:
    - group: CMSIS
      files:
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/startup_cm3031.c
        - file: ../../../../Library/Device/Nuvoton/cm3031/Source/system_cm3031.c
    - group: User
      files:
        - file: ../main.c
        - file: ../tft.c
        - file: ../touch_adc_bsp.c
        - file: ../nuvoton_logo.c
        - file: ../instrument-bag.c
    - group: Library
      files:
        - file: ../../../../Library/StdDriver/src/clk.c
        - file: ../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../Library/StdDriver/src/uart.c
        - file: ../../../../Library/StdDriver/src/spi.c
        - file: ../../../../Library/StdDriver/src/qspi.c
        - file: ../../../../Library/StdDriver/src/gpio.c
        - file: ../../../../Library/StdDriver/src/sys.c
        - file: ../../../../Library/StdDriver/src/pdma.c
        - file: ../../../../Library/StdDriver/src/eadc.c
    - group: sgl
      files:
        - file: ../../../../ThirdParty/sgl/core/sgl_anim.c
        - file: ../../../../ThirdParty/sgl/core/sgl_core.c
        - file: ../../../../ThirdParty/sgl/core/sgl_event.c
        - file: ../../../../ThirdParty/sgl/core/sgl_log.c
        - file: ../../../../ThirdParty/sgl/core/sgl_math.c
        - file: ../../../../ThirdParty/sgl/core/sgl_misc.c
        - file: ../../../../ThirdParty/sgl/core/sgl_snprintf.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_arc.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_circle.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_icon.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_line.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_rect.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_ring.c
        - file: ../../../../ThirdParty/sgl/draw/sgl_draw_text.c
        - file: ../../../../ThirdParty/sgl/fonts/sgl_ascii_song23.c
        - file: ../../../../ThirdParty/sgl/fonts/myfont23.c
        - file: ../../../../ThirdParty/sgl/mm/lwmem/lwmem.c
        - file: ../../../../ThirdParty/sgl/mm/lwmem/sgl_mm.c
        - file: ../../../../ThirdParty/sgl/widgets/button/sgl_button.c
        - file: ../../../../ThirdParty/sgl/widgets/arc/sgl_arc.c
        - file: ../../../../ThirdParty/sgl/widgets/checkbox/sgl_checkbox.c
        - file: ../../../../ThirdParty/sgl/widgets/circle/sgl_circle.c
        - file: ../../../../ThirdParty/sgl/widgets/icon/sgl_icon.c
        - file: ../../../../ThirdParty/sgl/widgets/label/sgl_label.c
        - file: ../../../../ThirdParty/sgl/widgets/line/sgl_line.c
        - file: ../../../../ThirdParty/sgl/widgets/msgbox/sgl_msgbox.c
        - file: ../../../../ThirdParty/sgl/widgets/rectangle/sgl_rectangle.c
        - file: ../../../../ThirdParty/sgl/widgets/ring/sgl_ring.c
        - file: ../../../../ThirdParty/sgl/widgets/slider/sgl_slider.c
        - file: ../../../../ThirdParty/sgl/widgets/switch/sgl_switch.c
        - file: ../../../../ThirdParty/sgl/widgets/textbox/sgl_textbox.c
        - file: ../../../../ThirdParty/sgl/widgets/textline/sgl_textline.c
        - file: ../../../../ThirdParty/sgl/widgets/keyboard/sgl_keyboard.c
        - file: ../../../../ThirdParty/sgl/widgets/ext_img/sgl_ext_img.c
        - file: ../../../../ThirdParty/sgl/fonts/FontAwesome_23.c
        - file: ../../../../ThirdParty/sgl/fonts/iconfont_23.c
